gzip on;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_types
    application/json
    application/javascript
    text/css
    text/plain
    text/xml
    application/geo+json;
gzip_proxied any;
gzip_vary on;

upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:3000;
}

server {
    listen 80;
    server_name _;
    # Allow large request bodies (e.g. big uploads)
    client_max_body_size 1G;

    # Proxy API requests to backend
    # Note: proxy_pass without trailing slash preserves the /api/ prefix
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Large GeoJSON responses (density / suitability maps)
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 16 256k;
        proxy_busy_buffers_size 512k;

        # Increase timeout for file uploads and map generation
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Proxy all other requests to frontend
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for React hot reload in development
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
