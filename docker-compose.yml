version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "8085:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  backend:
    build: ./backend
    expose:
      - "8000"
    volumes:
      - ./backend:/app
      - ./data/density:/data/density
      - ./data/thermal:/data/thermal
      - ./data/speciesgrids:/data/speciesgrids
      - ./data/cache:/data/cache
      - ./data/jobs:/data/jobs
    environment:
      - PYTHONUNBUFFERED=1
      - DENSITY_PATH=/data/density/data.parquet
      - THERMAL_THETAO_PATH=/data/thermal/thetao.parquet
      - THERMAL_PROFILES_PATH=/data/thermal/profiles.parquet
      - SPECIESGRIDS_DIR=/data/speciesgrids
      - SPECIESGRIDS_PATH=/data/speciesgrids/data.parquet
      - RESULT_CACHE_DIR=/data/cache
      - RESULT_CACHE_TTL_SECONDS=86400
      - JOBS_DIR=/data/jobs
      - JOBS_DB_PATH=/data/jobs/jobs.sqlite
      - JOB_META_TTL_SECONDS=3600
      - JOB_FAILED_TTL_SECONDS=86400
      - DENSITY_MAP_MIN_DENSITY=0.08
      - DENSITY_MAP_MIN_SUITABILITY=0.08

  worker:
    build: ./backend
    command: python worker.py
    volumes:
      - ./backend:/app
      - ./data/density:/data/density
      - ./data/thermal:/data/thermal
      - ./data/speciesgrids:/data/speciesgrids
      - ./data/cache:/data/cache
      - ./data/jobs:/data/jobs
    environment:
      - PYTHONUNBUFFERED=1
      - DENSITY_PATH=/data/density/data.parquet
      - THERMAL_THETAO_PATH=/data/thermal/thetao.parquet
      - THERMAL_PROFILES_PATH=/data/thermal/profiles.parquet
      - SPECIESGRIDS_DIR=/data/speciesgrids
      - SPECIESGRIDS_PATH=/data/speciesgrids/data.parquet
      - RESULT_CACHE_DIR=/data/cache
      - RESULT_CACHE_TTL_SECONDS=86400
      - JOBS_DIR=/data/jobs
      - JOBS_DB_PATH=/data/jobs/jobs.sqlite
      - JOB_META_TTL_SECONDS=3600
      - JOB_FAILED_TTL_SECONDS=86400
      - DENSITY_MAP_MIN_DENSITY=0.08
      - DENSITY_MAP_MIN_SUITABILITY=0.08
      - WORKER_POLL_INTERVAL_SECONDS=1
    depends_on:
      - backend
    restart: unless-stopped

  frontend:
    build: ./frontend
    expose:
      - "3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - REACT_APP_API_URL=
    depends_on:
      - backend
